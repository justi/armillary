# armillary feature tree — root: PROJECT
# Pitch: "Total recall for everything you've ever built."
# Status: built / planned / deferred / killed
# Priority: #N for build order

project:
  metadata:
    status: built                 # ACTIVE/PAUSED/DORMANT/IDEA/IN_PROGRESS
    git: built                    # branch, last_commit_ts, dirty_count, commit_count, work_hours
    readme: built                 # readme_excerpt, adr_paths, note_paths

  signals:                        # ADR 0017 — decision-support signals, all local + <1s
    commit_velocity: built        # S1 — 4-week commit trend: rising/falling/flat/dead (NEXT + DECIDE)
    skip_context: built           # S2 — skip_reason + skip_count — CLI next + dashboard detail banner
    dirty_file_age: built         # S3 — oldest mtime among uncommitted files, live (NEXT + CONTEXT)
    last_session: built           # S4 — duration of last commit block (<2h gaps), live (CONTEXT)
    first_commit_date: built      # S5 — enables project_age, intensity h/mo over active span (DECIDE)
    branch_count: built           # S6 — branch count + has_remote, safety for (DECIDE + ARCHIVE)
    monthly_sparkline: built      # 6-month commit activity sparkline — CLI context + next, dashboard, MCP
    days_since_commit: built      # bold warning >30d yellow, >90d red — CLI context, dashboard detail
    purpose: built                # user-editable one-liner ("why this exists"), stored in purposes.json
    readme_oneliner: built        # auto-extracted first sentence of README, fallback when no purpose

  discovery:
    search: built                 # ripgrep across all repos (CLI + MCP)
    list: built                   # filtered terminal table
    export: planned               # JSON output — formalize what bridge already does

  decisions:
    next: built                   # momentum / zombie / forgotten gold (CLI + MCP) — enriched by S1, S3
    skip: built                   # hide from next for 30 days — enriched by S2 (reason + count)
    context: built                # ADR 0013 — "where was I?" per project (CLI + MCP) — enriched by S3, S4, S5, S6
    decide: built                 # archive/activate commands — manual status override
    archive: built                # ARCHIVED status + tombstone detail view + filtering from all lists

  actions:
    open: built                   # launch in Cursor/VS Code/Zed
    scan: built                   # refresh all metadata
    dashboard: built              # Streamlit overview + detail + settings
    detail_redesign: built        # ADR 0014 — narrative layout, action buttons top, noise reduction

  ai_integration:
    mcp_server: built             # armillary_next, armillary_search, armillary_projects, armillary_context
    claude_bridge: built          # compact repos-index.md (ACTIVE/PAUSED only, 15 max)

  deferred:
    launch_window: "revisit when users ask — 5% of projects launch"
    reuse: "search already covers cross-repo code discovery"

  killed:
    tags: "grep covers it"
    embeddings: "too heavy, ripgrep is enough"
    digest: "productivity theater — next + MCP covers daily use"
    integrations: "zero built, speculative scope, maintenance trap"
    external_signals: "HN/PyPI/GitHub/Trends — panel 3/3 rejected: scope creep, vanity metrics"
    project_lineage: "v2/v3/v4 pattern is auto-gen tool, not user behavior"
